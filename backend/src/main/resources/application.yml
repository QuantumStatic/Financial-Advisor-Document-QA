spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/financial_advisor}
    username: ${SPRING_DATASOURCE_USERNAME:advisor_user}
    password: ${SPRING_DATASOURCE_PASSWORD:advisor_pass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 26MB

advisor:
  jwt-secret: ${JWT_SECRET}
  python-service-url: ${PYTHON_SERVICE_URL:http://localhost:8000}

logging:
  config: classpath:logback-spring.xml

server:
  port: 8080
